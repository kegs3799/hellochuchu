<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>楚楚 AI</title>
<style>
:root[data-theme="light"]{
  --bg:#f0f0f3;--glass:rgba(255,255,255,.65);--glass-hover:rgba(255,255,255,.8);
  --bubble-user:linear-gradient(135deg,#667eea,#764ba2);--bubble-ai:#fff;
  --text:#1a1a2e;--text-sub:#6b7280;--accent:#667eea;--border:rgba(255,255,255,.4);
  --shadow:0 8px 32px rgba(0,0,0,.08);--radius:16px;
}
:root[data-theme="dark"]{
  --bg:#0f0f14;--glass:rgba(30,30,40,.7);--glass-hover:rgba(40,40,55,.8);
  --bubble-user:linear-gradient(135deg,#818cf8,#6366f1);--bubble-ai:#1e1e2e;
  --text:#e4e4e7;--text-sub:#a1a1aa;--accent:#818cf8;--border:rgba(255,255,255,.1);
  --shadow:0 8px 32px rgba(0,0,0,.4);--radius:16px;
}
:root[data-theme="pink"]{
  --bg:#fdf2f8;--glass:rgba(255,255,255,.7);--glass-hover:rgba(255,255,255,.85);
  --bubble-user:linear-gradient(135deg,#f472b6,#ec4899);--bubble-ai:#fff;
  --text:#831843;--text-sub:#be185d;--accent:#ec4899;--border:rgba(251,207,232,.5);
  --shadow:0 8px 32px rgba(236,72,153,.12);--radius:16px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);min-height:100vh;color:var(--text);
  transition:background .3s,color .3s;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 20% 80%,rgba(102,126,234,.15) 0%,transparent 50%),
    radial-gradient(circle at 80% 20%,rgba(236,72,153,.1) 0%,transparent 50%);
}

/* 登录页 */
.auth-page{display:flex;align-items:center;justify-content:center;width:100%;height:100vh}
.auth-card{
  width:100%;max-width:380px;padding:44px 36px;
  background:var(--glass);backdrop-filter:blur(20px) saturate(180%);
  border-radius:var(--radius);border:1px solid var(--border);
  box-shadow:var(--shadow);transition:all .3s;
}
.auth-card h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:8px;letter-spacing:-.5px}
.auth-card p{text-align:center;color:var(--text-sub);margin-bottom:32px;font-size:14px}
.input-group{margin-bottom:18px}
.input-group label{display:block;font-size:13px;font-weight:500;margin-bottom:8px;color:var(--text)}
.input-group input{
  width:100%;padding:14px 16px;border:1.5px solid transparent;
  border-radius:12px;font-size:15px;background:rgba(255,255,255,.5);
  color:var(--text);outline:none;transition:all .2s;
}
.input-group input:focus{border-color:var(--accent);background:rgba(255,255,255,.8);box-shadow:0 0 0 4px rgba(102,126,234,.15)}
.hint{font-size:11px;color:var(--text-sub);margin-top:4px}
.btn{
  width:100%;padding:14px;border:none;border-radius:12px;
  font-size:15px;font-weight:600;cursor:pointer;
  background:var(--accent);color:#fff;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);margin-top:8px;
}
.btn:hover{transform:scale(1.02);filter:brightness(1.1);box-shadow:0 8px 24px rgba(102,126,234,.35)}
.btn:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--text-sub);border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--glass-hover);color:var(--text)}
.err{padding:10px 14px;background:rgba(239,68,68,.1);border-left:3px solid #ef4444;border-radius:8px;color:#dc2626;font-size:13px;margin-bottom:14px;display:none}
.err.show{display:block}
.sw{text-align:center;margin-top:18px;font-size:13px;color:var(--text-sub)}
.sw button{background:none;border:none;color:var(--accent);cursor:pointer;font-weight:500}

/* 聊天页 */
.chat-page{display:none;flex-direction:column;width:100%;max-width:900px;height:90vh;border-radius:var(--radius);overflow:hidden;background:var(--glass);backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--border);box-shadow:var(--shadow)}
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 24px;border-bottom:1px solid var(--border);
  background:var(--glass);backdrop-filter:blur(12px);
}
.header h1{font-size:18px;font-weight:600}
.badge{font-size:11px;background:rgba(102,126,234,.15);color:var(--accent);padding:2px 10px;border-radius:10px;margin-left:8px}
.theme-switcher{display:flex;gap:6px;background:rgba(255,255,255,.3);padding:4px;border-radius:10px}
.theme-btn{
  width:36px;height:36px;border:none;border-radius:8px;
  background:transparent;cursor:pointer;font-size:16px;
  transition:all .2s;color:var(--text-sub);
}
.theme-btn:hover{background:var(--glass-hover)}
.theme-btn.active{background:var(--accent);color:#fff}
.lo{padding:7px 14px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-sub);font-size:12px;cursor:pointer}
.lo:hover{background:var(--glass-hover);color:var(--text)}

.messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.message{display:flex;gap:12px;max-width:75%;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.message.user{margin-left:auto;flex-direction:row-reverse}
.avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;
}
.message.assistant .avatar{background:var(--accent);color:#fff}
.message.user .avatar{background:rgba(255,255,255,.6);color:var(--text-sub)}
.bubble{
  padding:14px 18px;border-radius:var(--radius);
  font-size:15px;line-height:1.6;transition:all .2s;
}
.message.assistant .bubble{background:var(--bubble-ai);color:var(--text);border-top-left-radius:4px}
.message.user .bubble{background:var(--bubble-user);color:#fff;border-top-right-radius:4px}
.bubble:hover{transform:translateY(-1px)}

.input-area{padding:16px 24px;border-top:1px solid var(--border);background:var(--glass)}
.input-row{display:flex;gap:12px;align-items:flex-end}
textarea{
  flex:1;padding:14px 18px;border:1.5px solid transparent;
  border-radius:16px;font-size:15px;resize:none;min-height:48px;max-height:140px;
  background:rgba(255,255,255,.5);color:var(--text);outline:none;
  transition:all .2s;line-height:1.5;
}
textarea:focus{border-color:var(--accent);background:rgba(255,255,255,.8);box-shadow:0 0 0 4px rgba(102,126,234,.12)}
.send-btn{
  width:48px;height:48px;border:none;border-radius:16px;
  background:var(--accent);color:#fff;cursor:pointer;font-size:18px;
  transition:all .25s cubic-bezier(.34,1.56,.64,1);flex-shrink:0;
}
.send-btn:hover{transform:scale(1.05) rotate(-5deg);filter:brightness(1.1);box-shadow:0 8px 24px rgba(102,126,234,.35)}
.send-btn:active{transform:scale(.95)}
.send-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}

.typing{display:flex;gap:6px;padding:8px 0}
.typing span{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:typing 1.4s infinite ease-in-out}
.typing span:nth-child(1){animation-delay:0s}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-8px)}}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-sub);text-align:center}
.empty .icon{font-size:64px;margin-bottom:20px;opacity:.4}
.empty h2{font-size:20px;font-weight:600;color:var(--text);margin-bottom:8px}
.empty p{font-size:14px;max-width:320px;line-height:1.6}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-card{background:var(--glass);backdrop-filter:blur(20px) saturate(180%);border-radius:var(--radius);border:1px solid var(--border);padding:36px 32px;max-width:340px;width:100%;text-align:center;animation:fadeIn .25s}
</style>
</head>
<body>

<div class="auth-page" id="authPage">
  <div class="auth-card">
    <h1>楚楚 AI</h1>
    <p id="subt">登录后开始对话</p>
    <div class="err" id="err"></div>
    <form id="af">
      <div class="input-group">
        <label>用户名</label>
        <input id="un" placeholder="中文、字母、数字或下划线" required/>
        <div class="hint">2–20位，支持中文、英文字母、数字、下划线</div>
      </div>
      <div class="input-group">
        <label>密码</label>
        <input id="pw" type="password" placeholder="至少6位" required/>
        <div class="hint">至少6位字符</div>
      </div>
      <button class="btn" id="sb" type="submit">登录</button>
    </form>
    <button class="btn btn-ghost" id="skipBtn">暂不登录，直接体验</button>
    <div class="sw"><span id="st">还没有账号？</span> <button id="swb">注册</button></div>
  </div>
</div>

<div class="chat-page" id="chatPage">
  <div class="header">
    <h1>💬 楚楚 AI <span class="badge" id="modeBadge">本地模式</span></h1>
    <div class="theme-switcher">
      <button class="theme-btn active" data-t="light" onclick="setTheme('light')">☀️</button>
      <button class="theme-btn" data-t="dark" onclick="setTheme('dark')">🌙</button>
      <button class="theme-btn" data-t="pink" onclick="setTheme('pink')">💖</button>
    </div>
    <button class="lo" id="lo">退出</button>
  </div>
  <div class="messages" id="messages">
    <div class="empty">
      <div class="icon">💬</div>
      <h2>开始对话</h2>
      <p>输入消息开始，对话自动保存到本地</p>
    </div>
  </div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="mi" placeholder="输入消息，Shift+Enter换行..." rows="1" onkeydown="handleKeydown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send" onclick="send()">➤</button>
    </div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <div style="font-size:48px;margin-bottom:16px">🎉</div>
    <h2 style="font-size:20px;font-weight:600;margin-bottom:8px">注册成功！</h2>
    <p style="font-size:14px;color:var(--text-sub);margin-bottom:24px">欢迎加入，现在可以开始和楚楚聊天了</p>
    <button class="btn" onclick="closeModal()">开始聊天</button>
  </div>
</div>

<script>
const SB_URL='https://gisixdmjugrmbruwhpxd.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpc2l4ZG1qdWdybWJydXdocHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTQxOTgsImV4cCI6MjA5Nzk5MDE5OH0.XU5QRV0SPJMJGayNsCSv888AvTW3JK3RcIUGHlNt9bA';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

let isLogin=true,curUser=null,isLocalMode=true,msgs=[];

// 主题
function setTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===t));
  localStorage.setItem('theme',t);
}
const savedTheme=localStorage.getItem('theme')||'light';setTheme(savedTheme);

function showErr(m){document.getElementById('err').textContent=m;document.getElementById('err').classList.add('show')}
function hideErr(){document.getElementById('err').classList.remove('show')}

document.getElementById('swb').onclick=()=>{
  isLogin=!isLogin;
  document.getElementById('sb').textContent=isLogin?'登录':'注册';
  document.getElementById('st').textContent=isLogin?'还没有账号？':'已有账号？';
  document.getElementById('swb').textContent=isLogin?'注册':'登录';
  document.getElementById('subt').textContent=isLogin?'登录后开始对话':'创建账号开始使用';
  hideErr();
};

document.getElementById('skipBtn').onclick=()=>{
  isLocalMode=true;curUser={id:'local'};
  document.getElementById('modeBadge').textContent='本地模式';
  document.getElementById('lo').textContent='刷新页面';
  showChat();
};

document.getElementById('af').onsubmit=async e=>{
  e.preventDefault();hideErr();
  const u=document.getElementById('un').value.trim();
  const p=document.getElementById('pw').value;
  if(!/^[\u4e00-\u9fa5a-zA-Z0-9_]{2,20}$/.test(u))return showErr('用户名2-20位，支持中文、字母、数字、下划线');
  if(p.length<6)return showErr('密码至少6位');
  document.getElementById('sb').disabled=true;
  document.getElementById('sb').textContent=isLogin?'登录中...':'注册中...';
  try{
    const em=u.normalize('NFKC').replace(/[^\w]/g,'')+'@chat.local';
    if(isLogin){
      const{r,error}=await sb.auth.signInWithPassword({email:em,password:p});
      if(error)throw error;
      isLocalMode=false;curUser=r.user;
      document.getElementById('modeBadge').textContent='已登录';
      showChat();
    }else{
      const{r,error}=await sb.auth.signUp({email:em,password:p,options:{data:{username:u}}});
      if(error)throw error;
      document.getElementById('modal').style.display='flex';
    }
  }catch(err){
    if(err.message.includes('Invalid login'))showErr('用户名或密码错误');
    else if(err.message.includes('already registered'))showErr('用户名已被占用');
    else showErr(err.message||'操作失败');
  }finally{
    document.getElementById('sb').disabled=false;
    document.getElementById('sb').textContent=isLogin?'登录':'注册';
  }
};

function closeModal(){
  document.getElementById('modal').style.display='none';
  isLocalMode=false;curUser={id:'registered'};
  document.getElementById('modeBadge').textContent='已登录';
  showChat();
}

function showChat(){
  document.getElementById('authPage').style.display='none';
  document.getElementById('chatPage').style.display='flex';
  loadLocalMsgs();
}

function loadLocalMsgs(){
  const local=JSON.parse(localStorage.getItem('chuchu_msgs')||'[]');
  if(local.length){
    document.querySelector('#messages .empty')?.remove();
    local.forEach(m=>addMsgDom(m.role,m.content));
  }
}

document.getElementById('lo').onclick=()=>{
  if(isLocalMode){location.reload();return;}
  sb.auth.signOut();
  isLocalMode=true;msgs=[];curUser=null;
  document.getElementById('modeBadge').textContent='本地模式';
  document.getElementById('lo').textContent='刷新页面';
  document.getElementById('messages').innerHTML='<div class="empty"><div class="icon">💬</div><h2>开始对话</h2><p>输入消息开始，对话自动保存到本地</p></div>';
  document.getElementById('authPage').style.display='flex';
  document.getElementById('chatPage').style.display='none';
};

function addMsgDom(role,c){
  document.querySelector('#messages .empty')?.remove();
  const d=document.createElement('div');d.className='message '+role;
  d.innerHTML=`<div class="avatar">${role==='user'?'你':'AI'}</div><div class="bubble">${c.replace(/\n/g,'<br>')}</div>`;
  document.getElementById('messages').appendChild(d);
  document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight;
  msgs.push({role,content:c});
  if(isLocalMode){
    const local=JSON.parse(localStorage.getItem('chuchu_msgs')||'[]');
    local.push({role,content:c});localStorage.setItem('chuchu_msgs',JSON.stringify(local.slice(-50)));
  }
}

function send(){
  const input=document.getElementById('mi');
  const t=input.value.trim();if(!t)return;
  addMsgDom('user',t);input.value='';input.style.height='auto';
  const btn=document.getElementById('send');btn.disabled=true;
  const typing=document.createElement('div');typing.className='message assistant';
  typing.innerHTML=`<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('messages').appendChild(typing);
  setTimeout(()=>{
    typing.remove();
    const replies=[
      '玻璃拟态的核心是 backdrop-filter: blur() 配合半透明背景，营造出磨砂玻璃的通透感 ✨',
      '试试切换主题！暗色模式下玻璃质感会更明显，因为对比度更高 🌙',
      '这个 UI 的弹簧动效用的是 cubic-bezier(.34,1.56,.64,1)，有轻微的过冲效果 😉',
      '粉色主题是我个人最喜欢的，温柔又不失活力 💖',
      '好的 UI 不只是好看，细腻的交互反馈也很重要——注意按钮的 hover 和 active 态 🎨'
    ];
    addMsgDom('assistant',replies[Math.floor(Math.random()*replies.length)]);
    btn.disabled=false;
  },1200+Math.random()*800);
}

function handleKeydown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,140)+'px'}
</script>
</body>
</html>
