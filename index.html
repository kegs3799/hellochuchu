<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>楚楚来啦</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f5f7fa;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
        }

        .chat-app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 820px;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.06), 0 8px 24px rgba(0, 0, 0, 0.02);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .chat-header {
            padding: 18px 20px 12px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: #ffffff;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: linear-gradient(145deg, #f5a0a0, #f0b6b6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 20px;
            box-shadow: 0 4px 8px rgba(245, 160, 160, 0.15);
        }

        .app-title {
            font-weight: 600;
            font-size: 18px;
            color: #0b0f1a;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .app-title .badge {
            font-size: 11px;
            font-weight: 500;
            background: #eef3fc;
            color: #2b5bd1;
            padding: 2px 10px;
            border-radius: 30px;
        }

        .header-right {
            font-size: 13px;
            color: #8e94a8;
            background: #f2f4f9;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-right i {
            font-size: 10px;
            color: #5b7bdb;
        }

        .messages-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px 8px 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #ffffff;
            scroll-behavior: smooth;
        }

        .messages-wrapper::-webkit-scrollbar {
            width: 3px;
        }
        .messages-wrapper::-webkit-scrollbar-thumb {
            background: #d9dee9;
            border-radius: 20px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 88%;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-icon {
            width: 32px;
            height: 32px;
            border-radius: 12px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            font-size: 14px;
            color: white;
            background: #c9cedc;
        }

        .message.user .msg-icon {
            background: #2b5bd1;
        }

        .message .bubble {
            background: #f1f3f8;
            padding: 12px 16px;
            border-radius: 20px;
            border-bottom-left-radius: 6px;
            font-size: 15px;
            line-height: 1.6;
            color: #141a26;
            word-break: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.01);
        }

        .message.user .bubble {
            background: #e9effa;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 6px;
        }

        .bubble p {
            margin-bottom: 6px;
        }
        .bubble p:last-child { margin-bottom: 0; }

        .bubble code {
            background: rgba(0,0,0,0.05);
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'SF Mono', monospace;
        }
        .bubble pre {
            background: #1a1f2b;
            color: #eef2f8;
            padding: 12px 16px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 13px;
            margin: 8px 0;
            font-family: 'SF Mono', monospace;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 4px;
            color: #8a92a6;
            font-size: 14px;
        }
        .typing-indicator .dot {
            width: 8px;
            height: 8px;
            background: #b6bdcf;
            border-radius: 50%;
            animation: bounce 1.4s infinite both;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }

        .input-area {
            padding: 12px 16px 20px 16px;
            border-top: 1px solid rgba(0,0,0,0.02);
            flex-shrink: 0;
            background: #ffffff;
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .input-wrap {
            flex: 1;
            background: #f2f4f9;
            border-radius: 30px;
            padding: 4px 16px;
            display: flex;
            align-items: flex-end;
            border: 1px solid transparent;
            transition: border 0.2s, background 0.2s;
        }

        .input-wrap:focus-within {
            background: #ffffff;
            border-color: #2b5bd1;
            box-shadow: 0 0 0 3px rgba(43, 91, 209, 0.06);
        }

        .input-wrap textarea {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            resize: none;
            padding: 10px 0;
            font-size: 15px;
            font-family: inherit;
            line-height: 1.5;
            min-height: 24px;
            max-height: 120px;
            color: #141a26;
        }

        .input-wrap textarea::placeholder {
            color: #a8b0c4;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border-radius: 30px;
            border: none;
            background: #2b5bd1;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 12px rgba(43, 91, 209, 0.18);
        }

        .send-btn:hover { background: #1f4bb8; }
        .send-btn:active { transform: scale(0.94); }
        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
        }

        .reminder-bar {
            text-align: center;
            font-size: 13px;
            color: #8a92a6;
            padding: 6px 12px 2px 12px;
            background: transparent;
            letter-spacing: 0.2px;
            flex-shrink: 0;
            transition: all 0.2s;
            min-height: 28px;
        }

        .reminder-bar strong {
            color: #2b5bd1;
            font-weight: 500;
        }

        @media (max-width: 500px) {
            body { padding: 0; }
            .chat-app {
                max-height: 100vh;
                border-radius: 0;
                height: 100vh;
                box-shadow: none;
            }
            .chat-header { padding: 14px 16px 10px 16px; }
            .messages-wrapper { padding: 16px 12px 4px 12px; }
            .input-area { padding: 10px 12px 16px 12px; }
        }

        .messages-wrapper {
            scrollbar-width: thin;
        }
    </style>
</head>
<body>
    <div class="chat-app">

        <div class="chat-header">
            <div class="header-left">
                <div class="avatar">楚</div>
                <div class="app-title">
                    楚楚
                    <span class="badge">AI</span>
                </div>
            </div>
            <div class="header-right">
                <i class="fas fa-circle" style="color: #34a853; font-size: 8px; margin-right: 4px;"></i> 在线
            </div>
        </div>

        <div class="messages-wrapper" id="messagesWrapper"></div>

        <div class="reminder-bar" id="reminderBar">
            <i class="far fa-comment-dots" style="margin-right: 4px;"></i> 和楚楚的每一次对话都很珍贵
        </div>

        <div class="input-area">
            <div class="input-wrap">
                <textarea id="userInput" rows="1" placeholder="给楚楚发条消息…" maxlength="2000"></textarea>
            </div>
            <button class="send-btn" id="sendBtn" aria-label="发送">
                <i class="fas fa-arrow-up"></i>
            </button>
        </div>
    </div>

    <script>
        (function() {
            const CONFIG = {
                API_KEY: 'b215737c75c040ec8b7c838110e36b97.vJDlbyIg93D0GG6d',
                MODEL: 'glm-4.5-air',
                API_BASE: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
                SYSTEM_PROMPT: '你是一个温柔、可爱、善解人意的AI助手，名字叫"楚楚"。你的语气活泼亲切，喜欢用轻松的语调跟用户聊天。回答要简洁有条理，但不要过于学术化，保持对话感。如果用户跟你打招呼，请热情回应并介绍自己。'
            };

            const messagesWrapper = document.getElementById('messagesWrapper');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const reminderBar = document.getElementById('reminderBar');

            let conversation = [];
            let messageCount = 0;
            let isProcessing = false;

            function scrollToBottom() {
                requestAnimationFrame(() => {
                    messagesWrapper.scrollTop = messagesWrapper.scrollHeight;
                });
            }

            function renderAllMessages() {
                if (conversation.length === 0) {
                    messagesWrapper.innerHTML = `
                        <div class="message" style="align-self: flex-start; max-width: 92%;">
                            <div class="msg-icon" style="background: #f0b6b6;">楚</div>
                            <div class="bubble" style="border-bottom-left-radius: 18px; border-bottom-right-radius: 6px;">
                                <p>👋 嗨，你来啦！我是 <strong>楚楚</strong>，你的专属聊天伙伴。</p>
                                <p style="margin-top: 6px; color: #4f566b; font-size: 14px;">有什么想聊的，直接告诉我吧～</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const msg of conversation) {
                    if (msg.role === 'system') continue;
                    const isUser = msg.role === 'user';
                    const iconLabel = isUser ? '你' : '楚';
                    const iconBg = isUser ? '#2b5bd1' : '#f0b6b6';
                    const alignClass = isUser ? 'user' : '';
                    const contentHtml = msg.content.replace(/\n/g, '<br>');
                    html += `
                        <div class="message ${alignClass}">
                            <div class="msg-icon" style="background: ${iconBg};">${iconLabel}</div>
                            <div class="bubble">${contentHtml}</div>
                        </div>
                    `;
                }
                messagesWrapper.innerHTML = html;
                scrollToBottom();
            }

            function addMessageAndRender(role, content) {
                conversation.push({ role, content });
                renderAllMessages();
                if (role === 'user') {
                    messageCount++;
                    updateReminder();
                }
            }

            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing-indicator';
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = `
                    <span style="color: #8a92a6;">楚楚</span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                `;
                messagesWrapper.appendChild(typingDiv);
                scrollToBottom();
            }

            function removeTyping() {
                const el = document.getElementById('typingIndicator');
                if (el) el.remove();
            }

            function updateReminder() {
                if (messageCount % 10 === 0 && messageCount > 0) {
                    reminderBar.innerHTML = `<i class="far fa-smile" style="margin-right: 4px;"></i> 您今日聊天机会快要用完了哦~ 但别担心，楚楚会一直陪着你 ✨`;
                    reminderBar.style.color = '#2b5bd1';
                    setTimeout(() => {
                        reminderBar.style.color = '#8a92a6';
                    }, 4000);
                } else {
                    reminderBar.innerHTML = `<i class="far fa-comment-dots" style="margin-right: 4px;"></i> 和楚楚的每一次对话都很珍贵`;
                }
            }

            async function sendMessageToAI(userMessage) {
                const apiKey = CONFIG.API_KEY.trim();

                if (!apiKey || apiKey === '') {
                    alert('⚠️ 请先在代码中配置有效的 API Key');
                    return false;
                }

                if (isProcessing) return false;

                addMessageAndRender('user', userMessage);

                const messages = [
                    { role: 'system', content: CONFIG.SYSTEM_PROMPT },
                    ...conversation.filter(m => m.role !== 'system')
                ];

                isProcessing = true;
                sendBtn.disabled = true;
                userInput.disabled = true;

                showTyping();

                try {
                    const response = await fetch(CONFIG.API_BASE, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify({
                            model: CONFIG.MODEL,
                            messages: messages,
                            stream: false,
                            max_tokens: 2048,
                            temperature: 0.7
                        })
                    });

                    removeTyping();

                    if (!response.ok) {
                        let errorMsg = `请求失败 (HTTP ${response.status})`;
                        try {
                            const errData = await response.json();
                            if (errData.error?.message) {
                                errorMsg = errData.error.message;
                            }
                        } catch (_) {}
                        throw new Error(errorMsg);
                    }

                    const data = await response.json();
                    const reply = data.choices?.[0]?.message?.content || '抱歉，楚楚没有收到有效回复。';

                    addMessageAndRender('assistant', reply);

                } catch (error) {
                    removeTyping();
                    console.error('API Error:', error);
                    const errorMsg = `❌ 出了点小状况：${error.message || '请检查网络或 API Key'}`;
                    addMessageAndRender('assistant', errorMsg);
                } finally {
                    isProcessing = false;
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    userInput.focus();
                }
                return true;
            }

            function handleSend() {
                const text = userInput.value.trim();
                if (!text || isProcessing) return;
                userInput.value = '';
                userInput.style.height = 'auto';
                sendMessageToAI(text);
            }

            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            sendBtn.addEventListener('click', handleSend);

            userInput.addEventListener('input', () => {
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
            });

            function init() {
                conversation = [];
                messageCount = 0;
                renderAllMessages();
                updateReminder();
                userInput.focus();
            }

            init();

        })();
    </script>
</body>
    </html>
