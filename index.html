<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  
  <!-- Prism 代码高亮 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  
  <style>
    /* ==================== CSS 变量系统 ==================== */
    :root[data-theme="light"] {
      --bg-primary: #ffffff;
      --bg-secondary: #f8f9fb;
      --bg-glass: rgba(255, 255, 255, 0.72);
      --bg-glass-hover: rgba(255, 255, 255, 0.85);
      --bg-bubble-user: linear-gradient(135deg, #2b5bd1 0%, #4c7cff 100%);
      --bg-bubble-assistant: #f1f3f7;
      --text-primary: #1a1a2e;
      --text-secondary: #6b7280;
      --text-inverse: #ffffff;
      --accent: #2b5bd1;
      --accent-hover: #1e41a3;
      --border: #e5e7eb;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.08);
      --radius: 16px;
      --radius-sm: 12px;
    }

    :root[data-theme="dark"] {
      --bg-primary: #1a1a1e;
      --bg-secondary: #252529;
      --bg-glass: rgba(37, 37, 41, 0.75);
      --bg-glass-hover: rgba(45, 45, 49, 0.85);
      --bg-bubble-user: linear-gradient(135deg, #4c7cff 0%, #6b93ff 100%);
      --bg-bubble-assistant: #2d2d31;
      --text-primary: #f0f0f5;
      --text-secondary: #9ca3af;
      --text-inverse: #1a1a1e;
      --accent: #4c7cff;
      --accent-hover: #6b93ff;
      --border: #3a3a3e;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.4);
      --radius: 16px;
      --radius-sm: 12px;
    }

    :root[data-theme="pink"] {
      --bg-primary: #fff8f9;
      --bg-secondary: #fff0f3;
      --bg-glass: rgba(255, 248, 249, 0.78);
      --bg-glass-hover: rgba(255, 240, 243, 0.88);
      --bg-bubble-user: linear-gradient(135deg, #e8688a 0%, #f094b0 100%);
      --bg-bubble-assistant: #ffeef2;
      --text-primary: #2d1b21;
      --text-secondary: #8b6b76;
      --text-inverse: #ffffff;
      --accent: #e8688a;
      --accent-hover: #d94f73;
      --border: #f5d0da;
      --shadow: 0 4px 24px rgba(232, 104, 138, 0.1);
      --shadow-glass: 0 8px 32px rgba(232, 104, 138, 0.12);
      --radius: 16px;
      --radius-sm: 12px;
    }

    /* ==================== 全局重置 ==================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background 0.3s ease, color 0.3s ease;
    }

    /* ==================== 登录页 ==================== */
    .auth-page {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px;
      background: var(--bg-glass);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: var(--radius);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: var(--shadow-glass);
      transition: all 0.3s ease;
    }

    .auth-card h1 {
      font-size: 28px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .auth-card p {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 36px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.2s ease;
      outline: none;
    }

    .input-group input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(43, 91, 209, 0.1);
    }

    :root[data-theme="pink"] .input-group input:focus {
      box-shadow: 0 0 0 3px rgba(232, 104, 138, 0.15);
    }

    .btn {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-top: 8px;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
      transform: scale(1.02);
      box-shadow: 0 4px 16px rgba(43, 91, 209, 0.3);
    }

    :root[data-theme="pink"] .btn-primary:hover {
      box-shadow: 0 4px 16px rgba(232, 104, 138, 0.35);
    }

    .btn-primary:active {
      transform: scale(0.98);
    }

    .auth-switch {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-switch button {
      background: none;
      border: none;
      color: var(--accent);
      font-weight: 500;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
    }

    .auth-switch button:hover {
      text-decoration: underline;
    }

    .error-msg {
      padding: 12px 16px;
      background: rgba(239, 68, 68, 0.1);
      border-left: 3px solid #ef4444;
      border-radius: 8px;
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* ==================== 聊天页 ==================== */
    .chat-page {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .chat-header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-switcher {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      padding: 4px;
      border-radius: 10px;
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .theme-btn:hover { background: var(--bg-glass-hover); }
    .theme-btn.active { background: var(--accent); color: white; }

    .logout-btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    /* 消息区 */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .message.assistant .avatar {
      background: var(--accent);
      color: white;
    }

    .message.user .avatar {
      background: var(--bg-secondary);
      color: var(--text-secondary);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius-sm);
      line-height: 1.65;
      font-size: 15px;
      max-width: calc(100% - 60px);
      transition: all 0.2s ease;
    }

    .message.assistant .bubble {
      background: var(--bg-bubble-assistant);
      color: var(--text-primary);
      border-top-left-radius: 4px;
    }

    .message.user .bubble {
      background: var(--bg-bubble-user);
      color: var(--text-inverse);
      border-top-right-radius: 4px;
    }

    .bubble:hover {
      transform: translateY(-1px);
    }

    .bubble pre {
      background: #1e1e2e !important;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .bubble code {
      font-family: 'SF Mono', Monaco, monospace;
      font-size: 13px;
    }

    .bubble p { margin-bottom: 10px; }
    .bubble p:last-child { margin-bottom: 0; }

    /* 输入区 */
    .input-area {
      padding: 20px 24px 28px;
      border-top: 1px solid var(--border);
      background: var(--bg-glass);
      backdrop-filter: blur(12px);
    }

    .input-wrapper {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .textarea-wrapper {
      flex: 1;
      position: relative;
    }

    textarea {
      width: 100%;
      padding: 16px 20px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      resize: none;
      min-height: 52px;
      max-height: 160px;
      background: var(--bg-primary);
      color: var(--text-primary);
      outline: none;
      transition: all 0.25s ease;
      line-height: 1.5;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(43, 91, 209, 0.08);
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
    }

    :root[data-theme="pink"] textarea:focus {
      box-shadow: 0 0 0 4px rgba(232, 104, 138, 0.12);
    }

    .send-btn {
      width: 52px;
      height: 52px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--accent-hover);
      transform: scale(1.05) rotate(-5deg);
      box-shadow: 0 6px 20px rgba(43, 91, 209, 0.3);
    }

    :root[data-theme="pink"] .send-btn:hover {
      box-shadow: 0 6px 20px rgba(232, 104, 138, 0.35);
    }

    .send-btn:active {
      transform: scale(0.95);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* 加载动画 */
    .typing-indicator {
      display: flex;
      gap: 6px;
      padding: 8px 0;
    }

    .typing-indicator span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: typing 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* 空状态 */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: var(--text-secondary);
      text-align: center;
    }

    .empty-state .icon {
      font-size: 64px;
      margin-bottom: 24px;
      opacity: 0.5;
    }

    .empty-state h2 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-primary);
    }

    .empty-state p {
      font-size: 15px;
      max-width: 400px;
      line-height: 1.6;
    }

    /* 响应式 */
    @media (max-width: 640px) {
      .auth-card { padding: 36px 28px; }
      .messages-container { padding: 20px 16px; }
      .input-area { padding: 16px; }
      .chat-header { padding: 12px 16px; }
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>

<body>
  <!-- 登录页 -->
  <div class="auth-page" id="authPage">
    <div class="auth-card">
      <h1>AI Chat</h1>
      <p id="authSubtitle">登录后开始对话</p>
      
      <div class="error-msg" id="errorMsg"></div>
      
      <form id="authForm">
        <div class="input-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required />
        </div>
        
        <div class="input-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
        </div>
        
        <button type="submit" class="btn btn-primary" id="submitBtn">登录</button>
      </form>
      
      <div class="auth-switch">
        <span id="switchText">还没有账号？</span>
        <button type="button" id="switchBtn">注册</button>
      </div>
    </div>
  </div>

  <!-- 聊天页 -->
  <div class="chat-page" id="chatPage">
    <header class="chat-header">
      <h1>AI Chat</h1>
      <div class="header-actions">
        <div class="theme-switcher">
          <button class="theme-btn active" data-theme="light" title="浅色">☀️</button>
          <button class="theme-btn" data-theme="dark" title="深色">🌙</button>
          <button class="theme-btn" data-theme="pink" title="粉色">💖</button>
        </div>
        <button class="logout-btn" id="logoutBtn">退出</button>
      </div>
    </header>
    
    <main class="messages-container" id="messagesContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">💬</div>
        <h2>开始一段对话</h2>
        <p>在下方输入你的问题，AI 将为你解答。你的对话会自动保存。</p>
      </div>
    </main>
    
    <div class="input-area">
      <div class="input-wrapper">
        <div class="input-row">
          <div class="textarea-wrapper">
            <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" title="发送">
            <span>➤</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==================== 配置 ====================
    const SUPABASE_URL = 'https://gisixdmjugrmbruwhpxd.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdpc2l4ZG1qdWdybWJydXdocHhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0MTQxOTgsImV4cCI6MjA5Nzk5MDE5OH0.XU5QRV0SPJMJGayNsCSv888AvTW3JK3RcIUGHlNt9bA';
    const EMAIL_SUFFIX = '@chat.local';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ==================== DOM ====================
    const authPage = document.getElementById('authPage');
    const chatPage = document.getElementById('chatPage');
    const authForm = document.getElementById('authForm');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submitBtn');
    const switchBtn = document.getElementById('switchBtn');
    const switchText = document.getElementById('switchText');
    const errorMsg = document.getElementById('errorMsg');
    const logoutBtn = document.getElementById('logoutBtn');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const emptyState = document.getElementById('emptyState');

    let isLoginMode = true;
    let currentUser = null;
    let currentConversationId = null;
    let messages = [];

    // ==================== 主题切换 ====================
    const themeBtns = document.querySelectorAll('.theme-btn');
    
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      themeBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.theme === theme));
      localStorage.setItem('theme', theme);
    }

    themeBtns.forEach(btn => btn.addEventListener('click', () => applyTheme(btn.dataset.theme)));

    const savedTheme = localStorage.getItem('theme') || 'light';
    applyTheme(savedTheme);

    // ==================== 认证 ====================
    function toEmail(username) {
      return `${username.trim()}${EMAIL_SUFFIX}`;
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
    }

    function hideError() {
      errorMsg.classList.remove('show');
    }

    switchBtn.addEventListener('click', () => {
      isLoginMode = !isLoginMode;
      submitBtn.textContent = isLoginMode ? '登录' : '注册';
      switchText.textContent = isLoginMode ? '还没有账号？' : '已有账号？';
      switchBtn.textContent = isLoginMode ? '注册' : '登录';
      document.getElementById('authSubtitle').textContent = isLoginMode ? '登录后开始对话' : '创建账号开始使用';
      hideError();
    });

    authForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const username = usernameInput.value.trim();
      const password = passwordInput.value;

      if (!/^[a-zA-Z0-9_]{3,20}$/.test(username)) {
        showError('用户名需为3-20位字母、数字或下划线');
        return;
      }

      if (password.length < 6) {
        showError('密码至少需要6位');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = isLoginMode ? '登录中...' : '注册中...';

      try {
        const email = toEmail(username);

        if (isLoginMode) {
          const { data, error } = await supabase.auth.signInWithPassword({ email, password });
          if (error) throw error;
        } else {
          const { data, error } = await supabase.auth.signUp({ email, password });
          if (error) throw error;
          
          // 注册成功后自动登录（解决 email confirm 关闭但仍无 session 的问题）
          if (!data.session) {
            const { data: loginData, error: loginError } = await supabase.auth.signInWithPassword({ email, password });
            if (loginError) throw loginError;
          }
        }
      } catch (err) {
        console.error('Auth error:', err);
        if (err.message.includes('Invalid login credentials')) {
          showError('用户名或密码错误');
        } else if (err.message.includes('already registered') || err.message.includes('already been registered')) {
          showError('用户名已被占用');
        } else {
          showError(err.message || '操作失败，请稍后重试');
        }
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = isLoginMode ? '登录' : '注册';
      }
    });

    // ==================== 登录态监听 ====================
    supabase.auth.onAuthStateChange((event, session) => {
      console.log('Auth event:', event, session);
      if (session?.user) {
        currentUser = session.user;
        showChatPage();
        loadConversations();
      } else {
        currentUser = null;
        showAuthPage();
      }
    });

    async function checkSession() {
      const { data: { session } } = await supabase.auth.getSession();
      if (session?.user) {
        currentUser = session.user;
        showChatPage();
        loadConversations();
      }
    }

    function showAuthPage() {
      authPage.style.display = 'flex';
      chatPage.style.display = 'none';
      usernameInput.value = '';
      passwordInput.value = '';
      hideError();
    }

    function showChatPage() {
      authPage.style.display = 'none';
      chatPage.style.display = 'flex';
    }

    logoutBtn.addEventListener('click', async () => {
      await supabase.auth.signOut();
      messages = [];
      currentConversationId = null;
      messagesContainer.innerHTML = '<div class="empty-state" id="emptyState"><div class="icon">💬</div><h2>开始一段对话</h2><p>在下方输入你的问题，AI 将为你解答。你的对话会自动保存。</p></div>';
    });

    // ==================== 聊天逻辑 ====================
    function formatMessage(content) {
      content = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
        const language = lang || 'plaintext';
        const highlighted = Prism.highlight(code.trim(), Prism.languages[language] || Prism.languages.plaintext, language);
        return `<pre><code class="language-${language}">${highlighted}</code></pre>`;
      });
      
      content = content.replace(/`([^`]+)`/g, '<code style="background:#f0f0f0;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px;">$1</code>');
      content = content.replace(/\n/g, '<br>');
      
      return content;
    }

    function addMessage(role, content) {
      emptyState.style.display = 'none';
      
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;
      
      messageDiv.innerHTML = `
        <div class="avatar">${role === 'user' ? '你' : 'AI'}</div>
        <div class="bubble">${formatMessage(content)}</div>
      `;
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      messages.push({ role, content });
    }

    function showTyping() {
      const indicator = document.createElement('div');
      indicator.className = 'message assistant typing-message';
      indicator.innerHTML = `
        <div class="avatar">AI</div>
        <div class="bubble">
          <div class="typing-indicator"><span></span><span></span><span></span></div>
        </div>
      `;
      messagesContainer.appendChild(indicator);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
      return indicator;
    }

    // ==================== Supabase 聊天记录 ====================
    async function createConversation(firstMessage) {
      const title = firstMessage.slice(0, 30) + (firstMessage.length > 30 ? '...' : '');
      const { data, error } = await supabase
        .from('conversations')
        .insert({ user_id: currentUser.id, title })
        .select()
        .single();
      
      if (error) throw error;
      currentConversationId = data.id;
      return data.id;
    }

    async function saveMessage(role, content) {
      if (!currentConversationId) {
        await createConversation(messages[0]?.content || '新对话');
      }
      
      const { error } = await supabase
        .from('messages')
        .insert({
          conversation_id: currentConversationId,
          role,
          content
        });
      
      if (error) console.error('保存消息失败:', error);
    }

    async function loadConversations() {
      const { data: conversations, error } = await supabase
        .from('conversations')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('updated_at', { ascending: false })
        .limit(1);
      
      if (error || !conversations?.length) return;
      
      currentConversationId = conversations[0].id;
      
      const { data: msgs, error: msgError } = await supabase
        .from('messages')
        .select('*')
        .eq('conversation_id', currentConversationId)
        .order('created_at', { ascending: true });
      
      if (msgError || !msgs?.length) return;
      
      emptyState.style.display = 'none';
      messages = msgs.map(m => ({ role: m.role, content: m.content }));
      msgs.forEach(m => {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${m.role}`;
        messageDiv.innerHTML = `
          <div class="avatar">${m.role === 'user' ? '你' : 'AI'}</div>
          <div class="bubble">${formatMessage(m.content)}</div>
        `;
        messagesContainer.appendChild(messageDiv);
      });
    }

    // ==================== 发送消息 ====================
    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;
      
      messageInput.value = '';
      messageInput.style.height = 'auto';
      sendBtn.disabled = true;
      
      addMessage('user', text);
      await saveMessage('user', text);
      
      const typingIndicator = showTyping();
      
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: messages.slice(-10) })
        });
        
        typingIndicator.remove();
        
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.error || '请求失败');
        }
        
        const data = await response.json();
        const aiContent = data.content || '抱歉，我暂时无法回复。';
        
        addMessage('assistant', aiContent);
        await saveMessage('assistant', aiContent);
      } catch (err) {
        typingIndicator.remove();
        console.error('Send message error:', err);
        addMessage('assistant', '网络出错了，请稍后再试～');
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function adjustTextareaHeight() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 160) + 'px';
    }

    messageInput.addEventListener('input', adjustTextareaHeight);

    // ==================== 初始化 ====================
    checkSession();
  </script>
</body>
</html>
